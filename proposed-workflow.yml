---
name: Update test results

'on':
    workflow_dispatch:
    schedule:
        - cron: '0 0 1 * *'
    push:
        branches:
            - the-one
        paths:
            - '**/*.php'
            - '**/*.json'
            - '.github/workflows/update-test-results.yml'

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    download-php-cli:
        runs-on: ubuntu-latest
        steps:
            - name: Pull PHP CLI image
              run: docker pull php:8.4-cli
            - name: Save PHP CLI image
              run: docker save php:8.4-cli -o php-8.4-cli.tar
            - name: Upload PHP CLI image
              uses: actions/upload-artifact@v4
              with:
                name: php-8.4-cli
                path: php-8.4-cli.tar
    build-fast:
        if: github.actor != 'github-actions[bot]'
        needs: download-php-cli
        runs-on: ubuntu-latest
        strategy:
            matrix:
                container:
                    - php-baseline
                    - dice.configured.singleton
                    - laminas-servicemanager.reflection.singleton
                    - php-di.reflection.singleton
                    - quickly.compiled.singleton
                    - quickly.reflection.singleton
                    - symfony.compiled.singleton
                    - yiisoft-di.configured.singleton
                    - yiisoft-di.reflection.singleton
                    - zen.compiled.singleton
        steps:
            - uses: actions/checkout@v5
            - name: Download PHP CLI image
              uses: actions/download-artifact@v5
              with:
                name: php-8.4-cli
                path: .
            - name: Load PHP CLI image
              run: docker load -i php-8.4-cli.tar
            - name: Build container
              run: |
                  docker build -t di-benchmark-${{ matrix.container }} -f containers/${{ matrix.container }}/Dockerfile .
                  docker save di-benchmark-${{ matrix.container }} -o di-benchmark-${{ matrix.container }}.tar
            - name: Upload image
              uses: actions/upload-artifact@v4
              with:
                name: di-benchmark-${{ matrix.container }}
                path: di-benchmark-${{ matrix.container }}.tar
    build-medium:
        if: github.actor != 'github-actions[bot]'
        needs: download-php-cli
        runs-on: ubuntu-latest
        strategy:
            matrix:
                container:
                    - aura-di.configured.transient
                    - auryn.reflection.transient
                    - laravel.reflection.singleton
                    - nette-di.compiled.singleton
                    - phalcon.configured.singleton
                    - phalcon.configured.transient
                    - pimple.configured.singleton
                    - quickly.configured.singleton
        steps:
            - uses: actions/checkout@v5
            - name: Download PHP CLI image
              uses: actions/download-artifact@v5
              with:
                name: php-8.4-cli
                path: .
            - name: Load PHP CLI image
              run: docker load -i php-8.4-cli.tar
            - name: Build container
              run: |
                  docker build -t di-benchmark-${{ matrix.container }} -f containers/${{ matrix.container }}/Dockerfile .
                  docker save di-benchmark-${{ matrix.container }} -o di-benchmark-${{ matrix.container }}.tar
            - name: Upload image
              uses: actions/upload-artifact@v4
              with:
                name: di-benchmark-${{ matrix.container }}
                path: di-benchmark-${{ matrix.container }}.tar
    build-slow:
        if: github.actor != 'github-actions[bot]'
        needs: download-php-cli
        runs-on: ubuntu-latest
        strategy:
            matrix:
                container:
                    - dice.reflection.transient
                    - laravel.configured.transient
                    - laravel.reflection.transient
                    - league.configured.transient
                    - league.reflection.transient
                    - pimple.configured.transient
                    - ray-di.compiled.transient
                    - ray-di.reflection.transient
        steps:
            - uses: actions/checkout@v5
            - name: Download PHP CLI image
              uses: actions/download-artifact@v5
              with:
                name: php-8.4-cli
                path: .
            - name: Load PHP CLI image
              run: docker load -i php-8.4-cli.tar
            - name: Build container
              run: |
                  docker build -t di-benchmark-${{ matrix.container }} -f containers/${{ matrix.container }}/Dockerfile .
                  docker save di-benchmark-${{ matrix.container }} -o di-benchmark-${{ matrix.container }}.tar
            - name: Upload image
              uses: actions/upload-artifact@v4
              with:
                name: di-benchmark-${{ matrix.container }}
                path: di-benchmark-${{ matrix.container }}.tar
    benchmark-fast-06:
        if: github.actor != 'github-actions[bot]'
        needs: build-fast
        runs-on: ubuntu-latest
        strategy:
            matrix:
                container:
                    - php-baseline
                    - dice.configured.singleton
                    - laminas-servicemanager.reflection.singleton
                    - php-di.reflection.singleton
                    - quickly.compiled.singleton
                    - quickly.reflection.singleton
                    - symfony.compiled.singleton
                    - yiisoft-di.configured.singleton
                    - yiisoft-di.reflection.singleton
                    - zen.compiled.singleton
                test:
                    - f06
                    - f06_startup
                run:
                    - 1
        steps:
            - uses: actions/checkout@v5
            - name: Download image
              uses: actions/download-artifact@v5
              with:
                name: di-benchmark-${{ matrix.container }}
                path: .
            - name: Load image
              run: docker load -i di-benchmark-${{ matrix.container }}.tar
            - name: Run benchmarks
              run: |
                  docker run --rm --memory=512m --memory-swap=512m --cpus=1.0 --pids-limit=100 -v "$PWD:/out" di-benchmark-${{ matrix.container }} php benchmark.php ${{ matrix.test }} 10 2>&1
                  mv results.json ${{ matrix.container }}-${{ matrix.test }}-${{ matrix.run }}.json
            - name: Upload results
              uses: actions/upload-artifact@v4
              with:
                name: result-${{ matrix.container }}-${{ matrix.test }}-${{ matrix.run }}
