---
name: Update test results

'on':
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'
  push:
    branches:
      - the-one

permissions:
  contents: write

jobs:
  benchmark:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        container:
          - laravel
          - nette-di
          - php-di
          - pimple
          - quickly.configured
          - quickly.reflection
          - symfony.compiled
          - symfony.uncompiled
        test:
          - f06
          - f06_startup
          - z26
          - z26_startup
    steps:
      - uses: actions/checkout@v5
      - name: Build and run benchmarks
        run: |
          docker build -t di-benchmark-${{ matrix.container }} \
            -f containers/${{ matrix.container }}/Dockerfile .
          docker run --rm di-benchmark-${{ matrix.container }} \
            php benchmark.php ${{ matrix.test }} 2>&1 \
            | tee ${{ matrix.container }}-${{ matrix.test }}.json
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.container }}-${{ matrix.test }}
          path: ${{ matrix.container }}-${{ matrix.test }}.json

  aggregate:
    if: github.actor != 'github-actions[bot]'
    needs: benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Download results
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          merge-multiple: true
      - name: Merge test results
        run: |
          set -euo pipefail
          readarray -t containers < <(ls *-*.json | cut -d'-' -f1 | sort -u)
          for container in "${containers[@]}"; do
            jq -s 'add' "${container}"-*.json > "${container}.json"
            rm "${container}"-*.json
          done
      - name: Update README
        run: |
          set -euo pipefail
          readarray -t dirs < <(
            ls *.json | sed 's/\.json$//' | sort
          )
          summary=""
          for dir in "${dirs[@]}"; do
            display_dir="$dir"
            if [[ "$dir" == *.* ]]; then
              display_dir="${dir%%.*}(${dir#*.})"
            fi
            avg=$(jq -r '.z26_startup.average' "$dir.json")
            min=$(jq -r '.z26_startup.min' "$dir.json")
            max=$(jq -r '.z26_startup.max' "$dir.json")
            summary+="| $display_dir | $avg | $min | $max |\n"
          done
          {
            echo '# PHP Dependency Injection Benchmark'
            echo
            echo 'This repository benchmarks different dependency injection'
            echo 'containers.'
            echo
            echo '## Summary'
            echo
            echo '| Container | Average | Minimum | Maximum |'
            echo '| --- | --- | --- | --- |'
            printf "%b" "$summary"
            echo
            printf '%s%s\n' '![Speed comparison without startup time]' \\
              '(speed_comparison_without_startup.png)'
            echo
            printf '%s%s\n' '![Speed comparison with startup time]' \\
              '(speed_comparison_with_startup.png)'
            echo
            echo '## Test Results'
            echo
            echo 'Results from the latest automated run of the Dockerized'
            echo 'benchmarks (triggered on pushes to main'
            echo 'and a monthly schedule):'
            echo
            for dir in "${dirs[@]}"; do
              display_dir="$dir"
              if [[ "$dir" == *.* ]]; then
                display_dir="${dir%%.*}(${dir#*.})"
              fi
              echo "### $display_dir"
              echo '```json'
              cat "$dir.json"
              echo '```'
              echo
            done
          } > README.md
      - name: Generate speed comparison graphs
        run: |
          pip install matplotlib
          python3 generate_graphs.py
      - name: Generate run summary
        run: |
          set -euo pipefail
          readarray -t dirs < <(
            ls *.json | sed 's/\.json$//' | sort
          )
          php_version=$(php -v | head -n1 | awk '{print $2}')
          date=$(date -u +%Y-%m-%d)
          mkdir -p archive
          {
            echo "php_version: \"${php_version}\""
            echo "dependency_versions:"
            for dir in "${dirs[@]}"; do
              comp_file="containers/$dir/composer.json"
              package=$(jq -r '.require | to_entries[0].key' "$comp_file")
              version=$(jq -r '.require | to_entries[0].value' "$comp_file")
              echo "  $dir:"
              echo "    $package: \"$version\""
            done
            echo "results:"
            for dir in "${dirs[@]}"; do
              avg=$(jq -r '.z26_startup.average' "$dir.json")
              min=$(jq -r '.z26_startup.min' "$dir.json")
              max=$(jq -r '.z26_startup.max' "$dir.json")
              echo "  $dir:"
              echo "    average: $avg"
              echo "    minimum: $min"
              echo "    maximum: $max"
            done
          } | tee run_summary.yaml "archive/$date.yaml"
      - name: Commit results
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email \
            'github-actions[bot]@users.noreply.github.com'
          git add README.md speed_comparison_without_startup.png \
            speed_comparison_with_startup.png run_summary.yaml archive
          git commit -m "Update test results" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
