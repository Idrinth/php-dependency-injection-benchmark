---
name: Update test results

'on':
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'
  push:
    branches:
      - the-one

permissions:
  contents: write

jobs:
  benchmark:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        container:
          - laravel
          - nette-di
          - php-di
          - pimple
          - quickly.configured
          - quickly.reflection
          - symfony.compiled
          - symfony.uncompiled
    steps:
      - uses: actions/checkout@v5
      - name: Build and run benchmarks
        run: |
          docker build -t di-benchmark-${{ matrix.container }} \
            -f containers/${{ matrix.container }}/Dockerfile .
          docker run --rm di-benchmark-${{ matrix.container }} 2>&1 \
            | tee ${{ matrix.container }}.txt
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.container }}
          path: ${{ matrix.container }}.txt

  aggregate:
    if: github.actor != 'github-actions[bot]'
    needs: benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Download results
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          merge-multiple: true
      - name: Update README
        run: |
          set -euo pipefail
          readarray -t dirs < <(
            ls *.txt | sed 's/\.txt$//' | sort
          )
          summary=""
          for dir in "${dirs[@]}"; do
            display_dir="$dir"
            if [[ "$dir" == *.* ]]; then
              display_dir="${dir%%.*}(${dir#*.})"
            fi
            line=$(tail -n 1 "$dir.txt")
            avg=$(echo "$line" | awk -F'|' '{print $1}' | tr -d ' ')
            min=$(echo "$line" | awk -F'|' '{print $2}' | tr -d ' ')
            max=$(echo "$line" | awk -F'|' '{print $3}' | tr -d ' ')
            summary+="| $display_dir | $avg | $min | $max |\n"
          done
          {
            echo '# PHP Dependency Injection Benchmark'
            echo
            echo 'This repository benchmarks different dependency injection containers.'
            echo
            echo '## Summary'
            echo
            echo '| Container | Average | Minimum | Maximum |'
            echo '| --- | --- | --- | --- |'
            printf "%b" "$summary"
            echo
            echo '![Speed comparison without startup time](speed_comparison_without_startup.png)'
            echo
            echo '![Speed comparison with startup time](speed_comparison_with_startup.png)'
            echo
            echo '## Test Results'
            echo
            echo 'Results from the latest automated run of the Dockerized benchmarks'
            echo '(triggered on pushes to main and a monthly schedule):'
            echo
            for dir in "${dirs[@]}"; do
              display_dir="$dir"
              if [[ "$dir" == *.* ]]; then
                display_dir="${dir%%.*}(${dir#*.})"
              fi
              echo "### $display_dir"
              echo '```'
              cat "$dir.txt"
              echo '```'
              echo
            done
          } > README.md
      - name: Generate speed comparison graphs
        run: |
          pip install matplotlib
          python3 generate_graphs.py
      - name: Commit results
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email \
            'github-actions[bot]@users.noreply.github.com'
          git add README.md speed_comparison_without_startup.png \
            speed_comparison_with_startup.png
          git commit -m "Update test results" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
