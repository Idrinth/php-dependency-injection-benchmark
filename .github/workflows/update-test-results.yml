name: Update test results

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'
  push:
    branches:
      - the-one

permissions:
  contents: write

jobs:
  tests:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build and run benchmarks in Docker
        run: |
          set -euo pipefail
          readarray -t dirs < <(find . -mindepth 3 -maxdepth 3 -name Dockerfile -exec dirname {} \; | sed 's|^\./||' | sort)
          summary=""
          for dir in "${dirs[@]}"; do
            docker build -t "di-benchmark-$dir" \
              -f "$dir/Dockerfile" .
            docker run --rm di-benchmark-"$dir" 2>&1 | tee "$dir".txt
            line=$(tail -n 1 "$dir".txt)
            avg=$(echo "$line" | awk -F'\|' '{print $1}' | tr -d ' ')
            min=$(echo "$line" | awk -F'\|' '{print $2}' | tr -d ' ')
            max=$(echo "$line" | awk -F'\|' '{print $3}' | tr -d ' ')
            summary+="| $dir | $avg | $min | $max |\n"
          done
          {
            echo '# PHP Dependency Injection Benchmark'
            echo
            echo 'This repository benchmarks different dependency injection containers.'
            echo
            echo '## Summary'
            echo
            echo '| Container | Average | Minimum | Maximum |'
            echo '| --- | --- | --- | --- |'
            printf "%b" "$summary"
            echo
            echo '![Speed comparison without startup time](speed_comparison_without_startup.png)'
            echo
            echo '![Speed comparison with startup time](speed_comparison_with_startup.png)'
            echo
            echo '## Test Results'
            echo
            echo 'Results from the latest automated run of the Dockerized benchmarks'
            echo '(triggered on pushes to main and a monthly schedule):'
            echo
            for dir in "${dirs[@]}"; do
              echo "### $dir"
              echo '```'
              cat "$dir".txt
              echo '```'
              echo
            done
          } > README.md
      - name: Generate speed comparison graphs
        run: |
          pip install matplotlib
          python3 generate_graphs.py
      - name: Commit results
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email \
            'github-actions[bot]@users.noreply.github.com'
          git add README.md speed_comparison_without_startup.png speed_comparison_with_startup.png
          git commit -m "Update test results" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
